<!DOCTYPE html>
<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff}
nav{display:flex;justify-content:space-between;padding:15px 30px;background:#111}
nav a{color:#fff;text-decoration:none;margin:0 10px;cursor:pointer}
.container{padding:30px}
.card{background:#151515;padding:20px;border-radius:12px;margin:15px 0;box-shadow:0 0 20px rgba(0,0,0,0.6)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}

img{width:150px;border-radius:50%;display:block;margin:auto}
.folder{cursor:pointer;padding:15px;background:#1f1f1f;border-radius:10px;margin:10px 0}
.file{padding:10px;margin-left:20px;cursor:pointer}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center}
.modal-content{background:#111;padding:20px;border-radius:10px;max-width:800px;max-height:80%;overflow:auto}
.close{float:right;cursor:pointer;color:red}
</style>
</head>
